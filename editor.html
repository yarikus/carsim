<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Car Editor</title>
        <style>
            html, body {
                margin: 0;
                height: 100%;
                background: rgb(10, 12, 14);
                color: rgba(255, 255, 255, 0.94);
                font-family: Arial, sans-serif;
            }

            body {
                display: grid;
                grid-template-columns: 380px 1fr;
                overflow: hidden;
            }

            .editor-sidebar {
                padding: 24px 20px;
                overflow-y: auto;
                background: linear-gradient(180deg, rgb(18, 20, 23) 0%, rgb(12, 14, 16) 100%);
                border-right: 1px solid rgba(255, 255, 255, 0.08);
                box-sizing: border-box;
            }

            .editor-title {
                margin: 0 0 8px;
                font-size: 28px;
            }

            .editor-copy {
                margin: 0 0 22px;
                color: rgba(255, 255, 255, 0.58);
                line-height: 1.5;
            }

            .panel {
                margin-bottom: 18px;
                padding: 16px;
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 16px;
                background: rgba(255, 255, 255, 0.04);
            }

            .panel h2 {
                margin: 0 0 12px;
                font-size: 15px;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.72);
            }

            .field {
                margin-bottom: 14px;
            }

            .field label {
                display: block;
                margin-bottom: 6px;
                font-size: 13px;
                color: rgba(255, 255, 255, 0.78);
            }

            .field input,
            .field select {
                width: 100%;
                box-sizing: border-box;
                border: 1px solid rgba(255, 255, 255, 0.12);
                border-radius: 12px;
                background: rgba(0, 0, 0, 0.24);
                color: rgba(255, 255, 255, 0.95);
                padding: 10px 12px;
                font-size: 14px;
            }

            .field input[type="color"] {
                height: 46px;
                padding: 4px;
            }

            .field-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

            .button-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .button {
                padding: 12px 14px;
                border: 1px solid rgba(255, 255, 255, 0.14);
                border-radius: 12px;
                background: rgba(255, 255, 255, 0.06);
                color: rgba(255, 255, 255, 0.94);
                font-size: 14px;
                cursor: pointer;
            }

            .button.is-primary {
                background: rgb(200, 64, 36);
                border-color: rgb(220, 90, 58);
            }

            .button:disabled {
                opacity: 0.45;
                cursor: not-allowed;
            }

            .preview-shell {
                position: relative;
                min-width: 0;
            }

            #previewCanvas {
                display: block;
                width: 100%;
                height: 100vh;
                background: linear-gradient(180deg, rgb(72, 108, 38) 0%, rgb(92, 128, 54) 100%);
            }

            .preview-overlay {
                position: absolute;
                top: 20px;
                left: 20px;
                padding: 14px 16px;
                border: 1px solid rgba(255, 255, 255, 0.12);
                border-radius: 16px;
                background: rgba(10, 12, 14, 0.42);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                pointer-events: none;
            }

            .preview-overlay strong,
            .preview-overlay span {
                display: block;
            }

            .preview-overlay strong {
                margin-bottom: 4px;
                font-size: 16px;
            }

            .preview-overlay span {
                font-size: 13px;
                color: rgba(255, 255, 255, 0.72);
            }
        </style>
    </head>
    <body>
        <aside class="editor-sidebar">
            <h1 class="editor-title">Vehicle Editor</h1>
            <p class="editor-copy">Один формат для редактора и основного симулятора. Сохраняй пресеты слева и сразу тестируй их справа на полигоне.</p>

            <section class="panel">
                <h2>Library</h2>
                <div class="field">
                    <label for="definitionSelect">Preset</label>
                    <select id="definitionSelect"></select>
                </div>
                <div class="button-row">
                    <button class="button" id="newPresetButton" type="button">New preset</button>
                    <button class="button" id="useInSimButton" type="button">Use in sim</button>
                </div>
            </section>

            <section class="panel">
                <h2>Identity</h2>
                <div class="field">
                    <label for="vehicleName">Name</label>
                    <input id="vehicleName" type="text" value="Custom Vehicle">
                </div>
                <div class="field-grid">
                    <div class="field">
                        <label for="vehicleType">Type</label>
                        <select id="vehicleType">
                            <option value="semi">Semi</option>
                            <option value="truck">Truck</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="vehicleForm">Form</label>
                        <select id="vehicleForm">
                            <option value="long-nose">Long Nose</option>
                            <option value="short-nose">Short Nose</option>
                            <option value="cabover">Cabover</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="panel">
                <h2>Colors</h2>
                <div class="field-grid">
                    <div class="field">
                        <label for="accentColor">Accent</label>
                        <input id="accentColor" type="color" value="#aa1c1c">
                    </div>
                    <div class="field">
                        <label for="bodyColor">Body</label>
                        <input id="bodyColor" type="color" value="#b9bdc2">
                    </div>
                    <div class="field">
                        <label for="trimColor">Trim</label>
                        <input id="trimColor" type="color" value="#c6cace">
                    </div>
                    <div class="field">
                        <label for="glassColor">Glass</label>
                        <input id="glassColor" type="color" value="#a3bccd">
                    </div>
                </div>
            </section>

            <section class="panel">
                <h2>Geometry</h2>
                <div class="field-grid">
                    <div class="field">
                        <label for="vehicleWidth">Width</label>
                        <input id="vehicleWidth" type="number" min="100" max="220" step="1" value="156">
                    </div>
                    <div class="field">
                        <label for="vehicleHeight">Height</label>
                        <input id="vehicleHeight" type="number" min="40" max="90" step="1" value="58">
                    </div>
                    <div class="field">
                        <label for="hoodRatio">Hood ratio</label>
                        <input id="hoodRatio" type="number" min="0.04" max="0.34" step="0.01" value="0.26">
                    </div>
                    <div class="field">
                        <label for="cabRatio">Cab ratio</label>
                        <input id="cabRatio" type="number" min="0.12" max="0.4" step="0.01" value="0.18">
                    </div>
                    <div class="field">
                        <label for="sleeperRatio">Sleeper ratio</label>
                        <input id="sleeperRatio" type="number" min="0.08" max="0.3" step="0.01" value="0.22">
                    </div>
                    <div class="field">
                        <label for="frameRatio">Frame ratio</label>
                        <input id="frameRatio" type="number" min="0.2" max="0.4" step="0.01" value="0.28">
                    </div>
                </div>
            </section>

            <section class="panel">
                <h2>Physics</h2>
                <div class="field-grid">
                    <div class="field">
                        <label for="wheelBase">Wheelbase</label>
                        <input id="wheelBase" type="number" min="60" max="130" step="1" value="96">
                    </div>
                    <div class="field">
                        <label for="hitchOffset">Hitch offset</label>
                        <input id="hitchOffset" type="number" min="-60" max="-10" step="1" value="-36">
                    </div>
                    <div class="field">
                        <label for="frontTrack">Front track</label>
                        <input id="frontTrack" type="number" min="30" max="60" step="1" value="44">
                    </div>
                    <div class="field">
                        <label for="rearTrack">Rear track</label>
                        <input id="rearTrack" type="number" min="30" max="60" step="1" value="44">
                    </div>
                    <div class="field">
                        <label for="vehicleMass">Mass</label>
                        <input id="vehicleMass" type="number" min="2000" max="15000" step="100" value="7200">
                    </div>
                    <div class="field">
                        <label for="vehicleStrength">Strength</label>
                        <input id="vehicleStrength" type="number" min="1000" max="30000" step="100" value="8200">
                    </div>
                </div>
            </section>

            <section class="panel">
                <div class="button-row">
                    <button class="button is-primary" id="savePresetButton" type="button">Save preset</button>
                    <button class="button" id="deletePresetButton" type="button">Delete custom</button>
                </div>
                <div id="editorStatus" style="margin-top:12px;font-size:13px;color:rgba(255,255,255,0.68);">Ready.</div>
            </section>
        </aside>

        <main class="preview-shell">
            <canvas id="previewCanvas" width="1280" height="720"></canvas>
            <div class="preview-overlay">
                <strong id="previewName">Peterbilt 379 Bobtail</strong>
                <span>WASD / Arrow keys for testing</span>
                <span id="previewMeta">Mass 7200 kg • Strength 8200</span>
            </div>
        </main>

        <script src="vehicle-definitions.js"></script>
        <script src="vehicle-appearance.js"></script>
        <script src="editor.js"></script>
    </body>
</html>
