<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Car Sim</title>
    </head>

    <body>
        <audio muted id="music">
            <source src="gasgasgas.mp3" type="audio/mpeg">
        </audio>
        <button id="musicToggle" type="button" aria-label="Pause music" title="Pause music">
            <span class="pause-icon" aria-hidden="true">
                <span></span>
                <span></span>
            </span>
        </button>
        <style>
            html, body {
                margin: 0;
                height: 100%;
                overflow: hidden;
                background: #111;
            }

            body {
                font-family: Arial, sans-serif;
            }

            #musicToggle {
                position: fixed;
                top: 20px;
                right: 20px;
                width: 58px;
                height: 58px;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 0;
                border: 1px solid rgba(255, 255, 255, 0.18);
                border-radius: 16px;
                background: rgba(12, 12, 12, 0.28);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                cursor: pointer;
                z-index: 2;
                transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
            }

            #musicToggle:hover {
                background: rgba(12, 12, 12, 0.42);
                border-color: rgba(255, 255, 255, 0.28);
                transform: translateY(-1px);
            }

            #musicToggle:active {
                transform: translateY(0);
            }

            #musicToggle:focus-visible {
                outline: 2px solid rgba(255, 255, 255, 0.45);
                outline-offset: 3px;
            }

            .pause-icon {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
                width: 22px;
                height: 22px;
            }

            .pause-icon span {
                width: 6px;
                height: 22px;
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.92);
                display: block;
            }

            #musicToggle.is-paused .pause-icon {
                width: 0;
                height: 0;
                gap: 0;
                border-top: 12px solid transparent;
                border-bottom: 12px solid transparent;
                border-left: 18px solid rgba(255, 255, 255, 0.92);
                transform: translateX(2px);
            }

            #musicToggle.is-paused .pause-icon span {
                display: none;
            }

            #tela {
                display: block;
                width: 100vw;
                height: 100vh;
                background: linear-gradient(180deg, rgb(72, 108, 38) 0%, rgb(92, 128, 54) 100%);
            }
        </style>
    <canvas id="tela" width="1280" height="680"></canvas>
    <script src="script.js"></script>
    </body>
</html>
